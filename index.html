<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf0f5;
      --warm-white: #fff5f9;
      --terracotta: #d4607a;
      --terracotta-light: #e8899e;
      --brown: #7a2d45;
      --brown-light: #b05470;
      --text: #3d1f2b;
      --text-muted: #b07a8e;
      --sand: #f5d0dc;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
    }

    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #f2b8cb, #e07090);
      top: -120px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #fcd5e2, #e8899e);
      bottom: -80px; right: -80px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    .blob-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #fce8f0, #d4607a);
      top: 40%; left: 60%;
      animation: drift3 10s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(40px, 30px); } }
    @keyframes drift2 { to { transform: translate(-30px, -40px); } }
    @keyframes drift3 { to { transform: translate(-20px, 20px); } }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 250, 244, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(201, 123, 75, 0.2);
      border-radius: 28px;
      padding: 64px 72px;
      max-width: 580px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 4px 32px rgba(107, 66, 38, 0.08),
        0 1px 0 rgba(255,255,255,0.8) inset;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Icon */
    .icon-wrap {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--terracotta-light), var(--terracotta));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 24px rgba(201, 123, 75, 0.3);
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .icon-wrap svg {
      width: 36px; height: 36px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Heading */
    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 2.6rem;
      line-height: 1.15;
      color: var(--brown);
      margin-bottom: 16px;
      animation: fadeUp 0.9s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 em {
      font-style: italic;
      color: var(--terracotta);
    }

    /* Subtitle */
    p.subtitle {
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
      animation: fadeUp 0.9s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 40px;
      animation: fadeUp 0.9s 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 6px;
      background: var(--sand);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--terracotta-light), var(--terracotta));
      border-radius: 99px;
      transition: width 2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 28px;
      animation: fadeUp 0.9s 0.32s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--sand);
    }
    .divider span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Email form */
    .notify-form {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.9s 0.36s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .notify-form input {
      flex: 1;
      padding: 13px 18px;
      border: 1.5px solid var(--sand);
      border-radius: 12px;
      background: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input::placeholder { color: var(--text-muted); }
    .notify-form input:focus { border-color: var(--terracotta-light); }

    .notify-form button {
      padding: 13px 22px;
      background: linear-gradient(135deg, var(--terracotta-light), var(--terracotta));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(201, 123, 75, 0.3);
    }

    .notify-form button:hover { opacity: 0.9; transform: translateY(-1px); }
    .notify-form button:active { transform: translateY(0); }

    .success-msg {
      display: none;
      color: var(--terracotta);
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 12px;
      animation: fadeUp 0.5s ease both;
    }

    /* Footer note */
    .footer-note {
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--text-muted);
      animation: fadeUp 0.9s 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Replace markers */
    .replace {
      background: rgba(201,123,75,0.12);
      border-radius: 4px;
      padding: 0 4px;
      font-style: normal;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <h1>Something <em>nice</em><br>is being built.</h1>

    <p class="subtitle">
      <!-- REPLACE: Update this description -->
      We're working hard to bring you something great.
      Check back soon — it'll be worth the wait!
    </p>

  </div>

  <script>
  </script>

</body>
</html>
