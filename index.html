<!-- ── data ─────────────────────────────────────────────────────────────── -->
<script>
// ── Hilfsfunktionen ────────────────────────────────────────────────────────
function _id(name) {
  return name.toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}

function _aliases(s1, s2) {
  return (s1 + ',' + s2).split(',').map(s => s.trim().toLowerCase()).filter(s => s.length > 1);
}

// ── Feste zweite Frage (gilt für alle Symptome) ────────────────────────────
const TREATMENT_Q = {
  q: "Erhalten Sie eine der folgenden Behandlungen?",
  options: [
    { key: "her2",  label: "anti-HER2 Antikörper",           desc: "Trastuzumab/Herceptin oder Pertuzumab/Perjeta" },
    { key: "cdk",   label: "CDK4/6i Abemaciclib (Verzenios)", desc: "CDK4/6-Hemmer" },
    { key: "chemo", label: "Chemotherapie",                   desc: "Klassische Zytostatika" },
    { key: "none",  label: "Keine der genannten Medikamente", desc: "Andere oder keine aktive Therapie" },
  ],
};

// Maskulina → "Ihren", Neutra → "Ihr", alles andere → "Ihre"
const _MASCULINE = new Set([
  'haarausfall', 'katarakt_grauer_star', 'schuettelfrost', 'husten', 'durchfall',
  'hautausschlag', 'hoher_blutdruck', 'niedriger_blutdruck',
  'verlust_der_fingernaegel_oder_zehennaegel',
  'juckreiz', 'tinnitus', 'vaginaler_ausfluss', 'schwindel', 'gewichtsverlust'
]);
const _NEUTER = new Set([
  'verschwommenes_sehen', 'schwindelgefuehl', 'nasenbluten', 'fieber',
  'generalisiertes_oedem', 'schwitzen', 'allgemeines_unwohlsein',
  'hand_fuss_syndrom', 'herzklopfen', 'kribbeln', 'herzrasen',
  'behandlungsbedingtes_sekundaeres_malignom', 'erbrechen'
]);

function _severityQ(name) {
  const id = _id(name);
  const poss = _MASCULINE.has(id) ? 'Ihren' : _NEUTER.has(id) ? 'Ihr' : 'Ihre';
  return {
    q: "Wie würden Sie " + poss + " " + name + " einschätzen?",
    options: [
      { key: "mild",     label: "Leicht",  desc: "Spürbar, beeinträchtigt den Alltag kaum" },
      { key: "moderate", label: "Mäßig",   desc: "Schränkt Aktivitäten ein, aber ich komme zurecht" },
      { key: "severe",   label: "Stark",   desc: "Deutliche Beeinträchtigung des Alltags" },
    ],
  };
}

const SEVERITY_LABEL = { mild:"Leicht", moderate:"Mäßig", severe:"Stark" };
const TREATMENT_LABEL = {
  her2:"anti-HER2 Antikörper", cdk:"CDK4/6i Abemaciclib",
  chemo:"Chemotherapie",       none:"Keine der genannten",
};

function _result(name) {
  return {
    contextLabel: ({ a }) =>
      (SEVERITY_LABEL[a[0]] || "Mäßig") + " · " + (TREATMENT_LABEL[a[1]] || ""),
    summary: name + " können im Rahmen der Brustkrebstherapie auftreten. Die Ursachen und der beste Umgang damit hängen oft von Ihrer aktuellen Behandlung ab.",
    sections: [
      { heading: "Was Sie tun können", body: "Beobachten Sie, wann und wie stark die Beschwerden auftreten, und halten Sie diese schriftlich fest. Kleine Anpassungen im Alltag können oft helfen." },
      { heading: "Mit dem Behandlungsteam sprechen", body: "Informieren Sie Ihr Behandlungsteam über Ihre Beschwerden. Gemeinsam können Sie die Ursache klären und geeignete Maßnahmen besprechen." },
      { heading: "Wann ärztlich abklären?", body: "Wenn die Beschwerden stark zunehmen, plötzlich auftreten oder mit anderen Symptomen einhergehen, wenden Sie sich bitte umgehend an Ihr Behandlungsteam." },
    ],
    suggested: [
      { tag: "Mini-Lektion", title: name + " – was steckt dahinter?", minutes: 4 },
    ],
  };
}

// ── SYMPTOMS-Array aufbauen ────────────────────────────────────────────────
const SYMPTOMS = RAW.map(([name, syn1, syn2], i) => ({
  id: _id(name),
  name,
  suggested: i < 5,
  aliases: _aliases(syn1, syn2),
  questions: [_severityQ(name), TREATMENT_Q],
  result: _result(name),
}));

// ── Spezifisches Ergebnis für Bauchschmerzen ───────────────────────────────
(function() {
  const s = SYMPTOMS.find(x => x.id === 'bauchschmerzen');
  if (!s) return;
  const general = [
    { heading: "Allgemeine Tipps bei Bauchschmerzen", body: "Denken Sie immer daran, genug zu trinken! Für die Verdauung benötigt Ihr Körper ausreichend Flüssigkeit. Versuchen Sie bei Blähungen warme Kräutertees (Anis, Fenchel, Kümmel, Kamille). Gegen Blähungen hilft oft Wärme – eine Wärmflasche oder ein erwärmtes Kirschkernkissen auf dem schmerzenden Teil des Bauches kann Erleichterung bringen. Auch leichtes Massieren im Uhrzeigersinn kann Verspannungen lösen. Bei Magenproblemen hilft Schonkost: Kartoffeln, gekochte Karotten, Bananen, eingeweichte Haferflocken oder Knäckebrot. Essen Sie langsam und kauen Sie gründlich. Auch Stress und eine hektische Lebensweise können Magenprobleme verursachen." },
    { heading: "Wann ärztlich abklären?", body: "Wenn die Bauchschmerzen stark sind, plötzlich zunehmen oder mit anderen Symptomen einhergehen, wenden Sie sich bitte umgehend an Ihr Behandlungsteam." },
  ];
  s.result = {
    contextLabel: ({ a }) =>
      (SEVERITY_LABEL[a[0]] || "Mäßig") + " · " + (TREATMENT_LABEL[a[1]] || ""),
    summary: "Bauchschmerzen können viele Ursachen haben. Bei Brustkrebspatientinnen können bestimmte Therapien Verdauungsprobleme verursachen.",
    sections: ({ a }) => {
      const t = a[1];
      if (t === 'her2') return [
        { heading: "anti-HER2 Antikörper (Trastuzumab/Herceptin oder Pertuzumab/Perjeta)", body: "Bei Brustkrebspatientinnen, die Antikörper gegen HER2 (Trastuzumab, Pertuzumab (Perjeta)) erhalten, beobachtet man häufiger Verdauungsprobleme wie Durchfall und gelegentlich unter Trastuzumab (Herceptin) auch Magenschmerzen. Pertuzumab (Perjeta) kann Durchfall hervorrufen – am häufigsten in Kombination mit Paclitaxel oder Docetaxel. Ältere Patientinnen (≥ 65 Jahre) haben ein größeres Risiko. Je nach Häufigkeit und Schweregrad der Durchfälle sollten Sie sich bei Ihren behandelnden Ärzten vorstellen." },
        ...general,

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      panel.style.right = offsetRef.current.x + 'px';
      panel.style.bottom = offsetRef.current.y + 'px';
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ title, children }) {
  return <><div className="twk-sect">{title}</div>{children}</>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakButton({ onClick, children }) {
  return <button type="button" className="twk-btn" onClick={onClick}>{children}</button>;
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" value={value} onChange={(e) => onChange(e.target.value)}
               style={{ width: 56, height: 22, border: '.5px solid rgba(0,0,0,.1)', borderRadius: 6, padding: 0, cursor: 'default', background: 'transparent' }} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: o }} onClick={() => onChange(o)}>
              {on && (
                <svg viewBox="0 0 14 14" style={{ position: 'absolute', top: 6, left: 6, width: 13, height: 13 }}>
                  <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
                        strokeLinecap="round" strokeLinejoin="round"
                        stroke={__twkIsLight(o) ? 'rgba(0,0,0,.78)' : '#fff'} />
                </svg>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakButton, TweakColor });
</script>

function SearchScreen({ history, onPick, onClearHistory }) {

    const term = q.trim().toLowerCase();
    if (!term || history.length === 0) return [];

      .map((id) => all.find((s) => s.id === id))
      .filter(Boolean)
      .filter((s) => s.name.toLowerCase().includes(term) || s.aliases.some((a) => a.includes(term)));

  const suggested = useMemo(() => {
    const ids = new Set(history.slice(0, 3));
    const recent = all.filter((s) => ids.has(s.id));
    const rest = all.filter((s) => s.suggested && !ids.has(s.id));
    return [...recent, ...rest].slice(0, 3);
  }, [history]);

  const general = useMemo(() => all.filter((s) => !suggested.find((x) => x.id === s.id)), [suggested]);

    <div style={{ padding: "20px 0 32px" }}>

                {historyMatches.map((s) => (
                  <button key={s.id} onClick={() => onPick(s.id)} style={{
                    all: "unset", cursor: "pointer", boxSizing: "border-box",

        <ProgressDots total={total} current={step} />
        <div style={{ marginTop: 20 }}>
          <div style={{ fontFamily: FONT, fontSize: 13, lineHeight: "20px", color: C.midGray, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>
            Frage {step + 1} von {total}
          </div>
          <h2 style={{ margin: "8px 0 0", fontSize: 22, lineHeight: "30px", fontWeight: 700, color: C.ink, letterSpacing: "-0.01em" }}>
            {q.q}
          </h2>
        </div>
        <div style={{ marginTop: 28, display: "flex", flexDirection: "column", gap: 12 }}>
          {q.options.map((opt) => (
            <RadioCard key={opt.key} opt={opt} selected={selected === opt.key} onPick={() => onAnswer(opt.key)} />
          ))}
        </div>
      </div>
      <div style={{ flexShrink: 0, background: C.white, padding: "16px 24px 34px", boxShadow: "0 -4px 24px rgba(0,16,51,0.06)" }}>
        <PrimaryBtn disabled={!selected} onClick={onContinue}>
          {step === total - 1 ? "Tipps anzeigen" : "Weiter"}
        </PrimaryBtn>
      </div>
    </div>
  );
}

function ProgressDots({ total, current }) {
  return (
    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          height: 4, flex: 1, borderRadius: 100,
          background: i <= current ? C.primary : C.pinkBorder,
          transition: "background 200ms"
        }} />
      ))}
    </div>
  );
}

function RadioCard({ opt, selected, onPick }) {
  return (
    <button onClick={onPick} style={{
      all: "unset", cursor: "pointer", boxSizing: "border-box", width: "100%",
      padding: "16px 16px 16px 18px", borderRadius: 14,
      background: selected ? C.pinkBgSoft : C.white,
      border: `1.5px solid ${selected ? C.primary : C.pinkBorder}`,
      display: "flex", gap: 14, alignItems: "flex-start",
      transition: "all 160ms", WebkitTapHighlightColor: "transparent"
    }}>
      <div style={{
        marginTop: 3, flexShrink: 0, width: 20, height: 20, borderRadius: 100,
        border: `2px solid ${selected ? C.primary : C.coolGray}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        background: selected ? C.primary : "transparent", transition: "all 160ms"
      }}>
        {selected && <div style={{ width: 8, height: 8, borderRadius: 100, background: C.white }} />}
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: FONT, fontSize: 15, lineHeight: "22px", fontWeight: 700, color: selected ? C.primary : C.ink, transition: "color 160ms" }}>
          {opt.label}
        </div>
        <div style={{ marginTop: 2, fontFamily: FONT, fontSize: 14, lineHeight: "20px", color: selected ? C.navy : C.midGray }}>
          {opt.desc}
        </div>
      </div>
    </button>
  );
}

// ── Result screen ─────────────────────────────────────────────────────────
const TAG_ICON = {
  "Mini-Lektion": Icon.book, "Atemübung": Icon.yoga, "Bewegung": Icon.yoga,
  "Übung": Icon.yoga, "Entspannung": Icon.yoga, "Audio": Icon.play,
  "Rezept": Icon.bowl, "Routine": Icon.check, "Checkliste": Icon.check
};
const TAG_TINT = {
  "Mini-Lektion": "#FFE5EF", "Atemübung": "#E6F2EC", "Bewegung": "#E6F2EC",
  "Übung": "#E6F2EC", "Entspannung": "#E6F2EC", "Audio": "#E8E5FF",
  "Rezept": "#FFF0DC", "Routine": "#EAF1FF", "Checkliste": "#EAF1FF"
};

function ResultScreen({ symptom, answers, history, repeatVisitTs, onRestart, onEdit, onPick }) {
  const r = symptom.result;
  const ctx = r.contextLabel({ a: answers });
  const sections = typeof r.sections === 'function' ? r.sections({ a: answers }) : r.sections;
  const recent = useMemo(
    () => history.filter((id) => id !== symptom.id).map((id) => window.SYMPTOMS.find((s) => s.id === id)).filter(Boolean).slice(0, 3),
    [history, symptom.id]
  );
  const poss = window._poss ? window._poss(symptom.id) : 'Ihre';
  const when = repeatVisitTs ? (() => {
    const d = Math.floor((Date.now() - repeatVisitTs) / 86400000);
    return d === 0 ? "heute" : d === 1 ? "gestern" : "vor " + d + " Tagen";
  })() : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ flex: 1, overflow: "auto" }}>
      <div style={{ padding: "20px 24px 16px" }}>
        <h2 style={{ margin: 0, fontSize: 22, lineHeight: "30px", fontWeight: 700, color: C.ink, letterSpacing: "-0.01em" }}>{symptom.name}</h2>
        <div style={{ marginTop: 4, fontFamily: FONT, fontSize: 13, lineHeight: "18px", color: C.midGray }}>{ctx}</div>
      </div>
      <div style={{ padding: "0 24px", display: "flex", flexDirection: "column", gap: 16 }}>
        <p style={{ margin: 0, fontFamily: FONT, fontSize: 15, lineHeight: "23px", color: C.ink }}>{r.summary}</p>

        {when && (
          <div style={{ padding: 16, borderRadius: 14, background: C.pinkBgSoft, border: `1px solid ${C.pinkBorder}` }}>
            <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: 15, lineHeight: "20px", color: C.primary, marginBottom: 6 }}>
              Hält {poss} {symptom.name} an?
            </div>
            <div style={{ fontFamily: FONT, fontSize: 14, lineHeight: "21px", color: C.ink }}>
              Sie haben sich {when} schon wegen {symptom.name} informiert. Wenn Ihr Symptom anhält, könnte es sinnvoll sein, mit Ihrem Arzt darüber zu sprechen.
            </div>
          </div>
        )}

        {sections.map((sec, i) => {
          const isWarn = i === sections.length - 1;
          return isWarn ? (
            <div key={i} style={{ padding: 16, borderRadius: 14, background: C.warnBgSoft, border: `1px solid #F4DD8A` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ color: "#7A5A00", display: "flex" }}><Icon.warn style={{ width: 18, height: 18 }}/></div>
                <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: 15, lineHeight: "20px", color: "#7A5A00" }}>{sec.heading}</div>
              </div>
              <div style={{ fontFamily: FONT, fontSize: 14, lineHeight: "21px", color: C.ink }}>{sec.body}</div>
            </div>
          ) : (
            <div key={i}>
              <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: 15, lineHeight: "20px", color: C.ink, marginBottom: 6 }}>{sec.heading}</div>
              <div style={{ fontFamily: FONT, fontSize: 14, lineHeight: "21px", color: C.ink }}>{sec.body}</div>
            </div>
          );
        })}

        <div style={{ marginTop: 16 }}>
          <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: 12, lineHeight: "20px", color: C.ink, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Empfohlen für Sie</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {r.suggested.map((item, i) => <SuggestedCard key={i} item={item} />)}
          </div>
        </div>

        {recent.length > 0 && (
          <div style={{ marginTop: 16 }}>
            <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: 12, lineHeight: "20px", color: C.midGray, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Vorherige Suche</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {recent.map((s) => <SymptomRow key={s.id} symptom={s} onPick={() => onPick(s.id)} />)}
            </div>
          </div>
        )}
      </div>
      <div style={{ height: 24 }} />
      </div>

      <div style={{
        flexShrink: 0,
        background: C.white, padding: "16px 24px 34px",
        boxShadow: "0 -4px 24px rgba(0,16,51,0.06)",
        display: "flex", flexDirection: "column", gap: 4
      }}>
        <PrimaryBtn onClick={onRestart}>Weiteres Symptom suchen</PrimaryBtn>
        <GhostBtn onClick={onEdit} icon={<Icon.edit />}>Antwort ändern</GhostBtn>
      </div>
    </div>
  );
}

function SuggestedCard({ item }) {
  const TIcon = TAG_ICON[item.tag] || Icon.book;
  const tint = TAG_TINT[item.tag] || C.pinkBgSoft;
  return (
    <div style={{
      padding: 8, borderRadius: 12,
      background: C.pinkBgSoft, border: `1px solid ${C.pinkBorderSoft}`,
      display: "flex", alignItems: "center", gap: 12,
      cursor: "pointer", transition: "transform 120ms", WebkitTapHighlightColor: "transparent"
    }}
    onMouseDown={(e) => (e.currentTarget.style.transform = "scale(0.99)")}
    onMouseUp={(e) => (e.currentTarget.style.transform = "")}
    onMouseLeave={(e) => (e.currentTarget.style.transform = "")}>
      <div style={{ width: 64, height: 64, borderRadius: 10, flexShrink: 0, background: tint, color: C.primary, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ transform: "scale(1.6)" }}><TIcon /></div>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: FONT, fontSize: 11, fontWeight: 700, lineHeight: "14px", color: C.primary, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 2 }}>
          {item.tag} · {item.minutes} Min.
        </div>
        <div style={{ fontFamily: FONT, fontSize: 14, lineHeight: "19px", color: C.ink, fontWeight: 600 }}>{item.title}</div>
      </div>
      <div style={{ color: C.coolGray, display: "flex", flexShrink: 0, marginRight: 4 }}><Icon.chevron /></div>
    </div>
  );
}

function useMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth <= 520);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth <= 520);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return mobile;
}

function useDeviceScale() {
  const compute = () => Math.min(1, (window.innerHeight - 64) / 874);
  const [scale, setScale] = useState(compute);
  useEffect(() => {
    const h = () => setScale(compute());
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return scale;
}

// ── Root app ──────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "showIntro": true, "primary": "#BF0058", "accent": "#FF3686" }/*EDITMODE-END*/;
const STORAGE_KEY = "symptom-kompass:v1";

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return null; return JSON.parse(raw); } catch { return null; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const initial = loadState();
  const [screen, setScreen] = useState(initial?.screen || (tweaks.showIntro ? "intro" : "search"));
  const [activeId, setActiveId] = useState(initial?.activeId || null);
  const [step, setStep] = useState(initial?.step || 0);
  const [answers, setAnswers] = useState(initial?.answers || []);
  const [history, setHistory] = useState(initial?.history || []);
  const [historyTimestamps, setHistoryTimestamps] = useState(initial?.historyTimestamps || {});
  const [repeatVisitTs, setRepeatVisitTs] = useState(null);

  useEffect(() => { saveState({ screen, activeId, step, answers, history, historyTimestamps }); }, [screen, activeId, step, answers, history, historyTimestamps]);

  useEffect(() => {
    C.primary = tweaks.primary || "#BF0058";
    C.primaryHot = tweaks.accent || "#FF3686";
  }, [tweaks.primary, tweaks.accent]);

  const symptom = activeId ? window.SYMPTOMS.find((s) => s.id === activeId) : null;

  function goToSearch() { setScreen("search"); setActiveId(null); setStep(0); setAnswers([]); }
  function pickSymptom(id) { setRepeatVisitTs(historyTimestamps[id] || null); setActiveId(id); setStep(0); setAnswers([]); setScreen("survey"); }
  function answerCurrent(key) { const next = [...answers]; next[step] = key; setAnswers(next); }
  function continueSurvey() {
    if (step < symptom.questions.length - 1) { setStep(step + 1); }
    else {
      setHistoryTimestamps(prev => ({ ...prev, [symptom.id]: Date.now() }));
      const newHist = [symptom.id, ...history.filter((id) => id !== symptom.id)].slice(0, 6);
      setHistory(newHist);
      setScreen("result");
    }
  }
  function backFromSurvey() { if (step > 0) setStep(step - 1); else goToSearch(); }
  function editAnswers() { setStep(0); setScreen("survey"); }

  const isMobile = useMobile();
  const deviceScale = useDeviceScale();
  const appBar = (
    <AppBar
      title="Symptom-Kompass"
      onBack={screen === "survey" ? backFromSurvey : screen === "result" ? goToSearch : null}
      onClose={() => goToSearch()}
    />
  );
  const screens = (
    <>
      {(screen === "search" || screen === "intro") && <SearchScreen history={history} onPick={pickSymptom} onClearHistory={() => setHistory([])} />}
      {screen === "survey" && symptom && (
        <SurveyScreen
          key={`${symptom.id}-${step}`}
          symptom={symptom}
          step={step}
          answers={answers}
          onAnswer={answerCurrent}
          onContinue={continueSurvey}
        />
      )}
      {screen === "result" && symptom && (
        <ResultScreen
          symptom={symptom}
          answers={answers}
          history={history}
          repeatVisitTs={repeatVisitTs}
          onRestart={goToSearch}
          onEdit={editAnswers}
          onPick={pickSymptom}
        />
      )}
    </>
  );

  return (
    <div style={{ width: isMobile ? "100%" : 402, position: "relative", fontFamily: FONT, color: C.ink }}>
      {isMobile ? (
        <div style={{ background: C.white, display: "flex", flexDirection: "column", height: "100dvh" }}>
          {appBar}
          <div style={{ flex: 1, overflow: screen === "survey" || screen === "result" ? "hidden" : "auto", minHeight: 0 }}>{screens}</div>
          {screen === "intro" && <IntroSheet onDismiss={() => setScreen("search")} />}
        </div>
      ) : (
        <div style={{ width: 402, height: 874 * deviceScale, position: "relative" }}>
          <div style={{ position: "absolute", top: 0, left: 0, width: 402, height: 874, transform: `scale(${deviceScale})`, transformOrigin: "top center" }}>
            <IOSDevice width={402} height={874}>
              <div style={{ position: "relative", width: "100%", height: "100%", background: C.white, display: "flex", flexDirection: "column" }}>
                <div style={{ paddingTop: 62 }}>{appBar}</div>
                <div style={{ flex: 1, overflow: screen === "survey" || screen === "result" ? "hidden" : "auto", paddingBottom: 0 }}>{screens}</div>
                {screen === "intro" && <IntroSheet onDismiss={() => setScreen("search")} />}
              </div>
            </IOSDevice>
          </div>
        </div>
      )}

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Erlebnis">
            <window.TweakToggle
              label="Intro-Modal beim Start zeigen"
              value={tweaks.showIntro}
              onChange={(v) => { setTweak("showIntro", v); if (v) setScreen("intro"); }}
            />
            <window.TweakButton onClick={() => { localStorage.removeItem(STORAGE_KEY); setHistory([]); goToSearch(); }}>
              Verlauf zurücksetzen
            </window.TweakButton>
          </window.TweakSection>
          <window.TweakSection title="Sprung in den Flow">
            <window.TweakButton onClick={() => setScreen("intro")}>Intro-Modal</window.TweakButton>
            <window.TweakButton onClick={goToSearch}>Suche</window.TweakButton>
            <window.TweakButton onClick={() => pickSymptom("erschoepfung")}>Survey · Erschöpfung</window.TweakButton>
            <window.TweakButton onClick={() => { setActiveId("erschoepfung"); setAnswers(["moderate", "chemo_cdk"]); setHistoryTimestamps(p => ({ ...p, erschoepfung: Date.now() })); setHistory((h) => ["erschoepfung", ...h.filter((x) => x !== "erschoepfung")].slice(0, 6)); setScreen("result"); }}>
              Ergebnis · Erschöpfung
            </window.TweakButton>
            <window.TweakButton onClick={() => pickSymptom("uebelkeit")}>Survey · Übelkeit</window.TweakButton>
            <window.TweakButton onClick={() => { setActiveId("uebelkeit"); setAnswers(["moderate", "chemo"]); setHistoryTimestamps(p => ({ ...p, uebelkeit: Date.now() })); setHistory((h) => ["uebelkeit", ...h.filter((x) => x !== "uebelkeit")].slice(0, 6)); setScreen("result"); }}>
              Ergebnis · Übelkeit
            </window.TweakButton>
          </window.TweakSection>
          <window.TweakSection title="Farben">
            <window.TweakColor
              label="Primärfarbe"
              value={tweaks.primary}
              onChange={(v) => setTweak("primary", v)}
              options={["#BF0058", "#0050FF", "#1F8A5B", "#5A2BBA"]}
            />
            <window.TweakColor
              label="Akzentfarbe"
              value={tweaks.accent}
              onChange={(v) => setTweak("accent", v)}
              options={["#FF3686", "#FF7A00", "#00B8A9", "#7C5CFF"]}
            />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

window.App = App;
</script>

<!-- ── bootstrap ─────────────────────────────────────────────────────────── -->
<script type="text/babel">
  setTimeout(() => {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<window.App />);
  }, 50);
</script>
</body>
</html>
